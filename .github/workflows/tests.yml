name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.3"
          - "8.4"
          - "8.5"

    steps:
      - name: Checkout client
        uses: actions/checkout@v7
        with:
          path: client

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --strict
        working-directory: client

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
        working-directory: client

      - name: Run tests
        run: composer test
        working-directory: client

  coverage:
    name: Coverage
    if: github.ref == 'refs/heads/main'
    needs: tests
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-badge
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout client
        uses: actions/checkout@v7
        with:
          path: client

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
        working-directory: client

      - name: Measure coverage
        working-directory: client
        run: |
          mkdir -p build
          vendor/bin/phpunit --coverage-clover=build/coverage.xml --coverage-filter=src
          php -r '$xml = simplexml_load_file("build/coverage.xml"); $metrics = $xml->project->metrics; $statements = (int) $metrics["statements"]; $covered = (int) $metrics["coveredstatements"]; $percentage = $statements > 0 ? ($covered / $statements) * 100 : 0; file_put_contents("build/coverage-percentage.txt", (string) $percentage);'

      - name: Generate coverage badge
        working-directory: client
        run: node .github/scripts/write-coverage-badge.mjs "$(cat build/coverage-percentage.txt)" build/coverage.svg

      - name: Publish coverage badge
        working-directory: client
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-coverage-badge.sh build/coverage.svg
