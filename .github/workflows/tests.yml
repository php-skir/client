name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.3"
            laravel: "10"
            testbench: "^8.0"
            phpunit: "^10.5"
          - php: "8.3"
            laravel: "11"
            testbench: "^9.0"
            phpunit: "^11.5"
          - php: "8.3"
            laravel: "12"
            testbench: "^10.0"
            phpunit: "^11.5"
          - php: "8.3"
            laravel: "13"
            testbench: "^11.0"
            phpunit: "^12.5"
          - php: "8.4"
            laravel: "13"
            testbench: "^11.0"
            phpunit: "^12.5"
          - php: "8.5"
            laravel: "13"
            testbench: "^11.0"
            phpunit: "^12.5"

    steps:
      - name: Checkout client
        uses: actions/checkout@v7
        with:
          path: client

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --strict
        working-directory: client

      - name: Install dependencies
        run: |
          composer update \
            --with "laravel/framework:^${{ matrix.laravel }}.0" \
            --with "orchestra/testbench:${{ matrix.testbench }}" \
            --with "phpunit/phpunit:${{ matrix.phpunit }}" \
            --prefer-stable \
            --prefer-dist \
            --no-interaction \
            --no-progress
        working-directory: client

      - name: Run tests
        run: composer test
        working-directory: client

  coverage:
    name: Coverage
    needs: tests
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout client
        uses: actions/checkout@v7
        with:
          path: client

      - name: Checkout runtime
        uses: actions/checkout@v7
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress
        working-directory: client

      - name: Measure coverage
        working-directory: client
        run: |
          mkdir -p build
          vendor/bin/phpunit --coverage-clover=build/coverage.xml --coverage-filter=src
          php -r '$minimum = 80.0; $xml = simplexml_load_file("build/coverage.xml"); $metrics = $xml->project->metrics; $statements = (int) $metrics["statements"]; $covered = (int) $metrics["coveredstatements"]; $percentage = $statements > 0 ? ($covered / $statements) * 100 : 0; file_put_contents("build/coverage-percentage.txt", (string) $percentage); if ($percentage < $minimum) { fwrite(STDERR, sprintf("Statement coverage %.2f%% is below the %.2f%% minimum.\n", $percentage, $minimum)); exit(1); } printf("Statement coverage %.2f%% meets the %.2f%% minimum.\n", $percentage, $minimum);'

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: client
        run: node .github/scripts/write-coverage-badge.mjs "$(cat build/coverage-percentage.txt)" build/coverage.svg

      - name: Upload coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: |
            client/build/coverage.svg
            client/build/coverage-percentage.txt
          if-no-files-found: error
          retention-days: 1

  publish-coverage-badge:
    name: Publish coverage badge
    if: github.ref == 'refs/heads/main'
    needs: coverage
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-badge
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout client
        uses: actions/checkout@v7
        with:
          path: client

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: client/build

      - name: Publish coverage badge
        working-directory: client
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-coverage-badge.sh build/coverage.svg
